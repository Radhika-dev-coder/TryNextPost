<div class="login-page">
  <form class="card" (ngSubmit)="submit()">
    <p class="brand">TryNextPost</p>
    <h1>Seller login</h1>
    <p class="hint">Login with Seller account to recharge wallet (or SuperAdmin to browse).</p>

    <label>
      Email
      <input type="email" [(ngModel)]="email" name="email" required autocomplete="username" />
    </label>

    <label>
      Password
      <input
        type="password"
        [(ngModel)]="password"
        name="password"
        required
        autocomplete="current-password"
      />
    </label>

    @if (error()) {
      <p class="error">{{ error() }}</p>
    }

    <button type="submit" [disabled]="loading()">
      {{ loading() ? 'Signing in…' : 'Sign in' }}
    </button>
  </form>
</div>
